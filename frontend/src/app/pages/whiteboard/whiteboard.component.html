<div class="whiteboard-page">
  <!-- Toolbar -->
  <div class="wb-toolbar glass-card">
    <!-- Tools -->
    <div class="tool-group">
      <button class="tool-btn" [class.active]="activeTool === 'select'" (click)="setTool('select')" data-tooltip="Select"><span class="material-symbols-rounded">mouse</span></button>
      <button class="tool-btn" [class.active]="activeTool === 'pen'" (click)="setTool('pen')" data-tooltip="Pen"><span class="material-symbols-rounded">edit</span></button>
      <button class="tool-btn" [class.active]="activeTool === 'highlighter'" (click)="setTool('highlighter')" data-tooltip="Highlight"><span class="material-symbols-rounded">ink_highlighter</span></button>
      <button class="tool-btn" [class.active]="activeTool === 'eraser'" (click)="setTool('eraser')" data-tooltip="Eraser"><span class="material-symbols-rounded">ink_eraser</span></button>
      <button class="tool-btn" [class.active]="activeTool === 'text'" (click)="setTool('text')" data-tooltip="Text"><span class="material-symbols-rounded">title</span></button>
    </div>

    <div class="separator"></div>

    <!-- Shapes -->
    <div class="tool-group">
      <button class="tool-btn" (click)="addShape('rect')" data-tooltip="Rectangle"><span class="material-symbols-rounded">rectangle</span></button>
      <button class="tool-btn" (click)="addShape('circle')" data-tooltip="Circle"><span class="material-symbols-rounded">circle</span></button>
      <button class="tool-btn" (click)="addShape('line')" data-tooltip="Line"><span class="material-symbols-rounded">horizontal_rule</span></button>
      <button class="tool-btn" (click)="addShape('arrow')" data-tooltip="Arrow"><span class="material-symbols-rounded">arrow_right_alt</span></button>
    </div>

    <div class="separator"></div>

    <!-- Color Picker -->
    <div class="color-palette">
      @for (color of colors; track color) {
        <button
          class="color-dot"
          [style.background]="color"
          [class.active]="activeColor === color"
          (click)="activeColor = color; applyColor()"
        ></button>
      }
      <input type="color" class="custom-color" [(ngModel)]="activeColor" (change)="applyColor()" title="Custom color" />
    </div>

    <div class="separator"></div>

    <!-- Stroke Width -->
    <div class="stroke-control">
      <span class="stroke-label">Size</span>
      <input type="range" min="1" max="20" [(ngModel)]="strokeWidth" (input)="applyStrokeWidth()" class="stroke-slider" />
      <span class="stroke-value">{{ strokeWidth }}</span>
    </div>

    <div class="separator"></div>

    <!-- Actions -->
    <div class="tool-group">
      <button class="tool-btn" (click)="undo()" data-tooltip="Undo"><span class="material-symbols-rounded">undo</span></button>
      <button class="tool-btn" (click)="redo()" data-tooltip="Redo"><span class="material-symbols-rounded">redo</span></button>
      <button class="tool-btn" (click)="clearCanvas()" data-tooltip="Clear"><span class="material-symbols-rounded">delete</span></button>
      <button class="tool-btn" (click)="saveCanvas()" data-tooltip="Save PNG"><span class="material-symbols-rounded">save</span></button>
    </div>

    <div class="separator"></div>

    <!-- Room Management -->
    <div class="tool-group room-management">
      <button class="tool-btn" (click)="generateNewRoom()" data-tooltip="New Random Room"><span class="material-symbols-rounded">add_box</span></button>
      <span class="room-id-display">Room: {{ roomId }}</span>
      <input type="text" [(ngModel)]="joinCode" placeholder="Enter code" class="room-input" />
      <button class="tool-btn" (click)="joinRoom()" data-tooltip="Join Room"><span class="material-symbols-rounded">login</span></button>
      <button class="tool-btn share-btn" (click)="copyShareLink()" data-tooltip="Copy Share Link"><span class="material-symbols-rounded">share</span></button>
    </div>
  </div>

  <!-- Canvas Container -->
  <div class="canvas-wrapper">
    <canvas #whiteboardCanvas id="whiteboard-canvas"></canvas>

    <!-- Collaborators -->
    <div class="collaborators">
      <div class="collab-avatar" data-tooltip="You (online)">
        {{ userName }}
      </div>
    </div>

    <!-- Status -->
    <div class="wb-status">
      <span class="status-dot"></span>
      {{ strokeCount }} strokes
    </div>
  </div>
</div>
